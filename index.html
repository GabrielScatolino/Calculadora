<!DOCTYPE html>
<html>

<head>
    <title>Calculadora</title>
    <link rel="stylesheet" href="CSS/JS/style.css">
    <script src="CSS/JS/script.js"></script>
</head>

<body>
    <section>
        <h1>Calculadora</h1>
        <section>
            <div class="calc">
                <div class="display-wrap">
                    <div class="display-expr" id="expr"></div>
                    <div class="display-main" id="display">0</div>
                </div>
                <div class="grid">
                    <button class="btn btn-clear" onclick="clearCal()">C</button>
                    <button class="btn btn-fn" onclick="toggleSign()">+/-</button>
                    <button class="btn btn-fn" onclick="applyPercent()">%</button>
                    <button class="btn btn-op" onclick="pressOp('/')">÷</button>

                    <button class="btn btn-num" onclick="pressNum('7')">7</button>
                    <button class="btn btn-num" onclick="pressNum('8')">8</button>
                    <button class="btn btn-num" onclick="pressNum('9')">9</button>
                    <button class="btn btn-op" onclick="pressOp('*')">×</button>

                    <button class="btn btn-num" onclick="pressNum('4')">4</button>
                    <button class="btn btn-num" onclick="pressNum('5')">5</button>
                    <button class="btn btn-num" onclick="pressNum('6')">6</button>
                    <button class="btn btn-op" onclick="pressOp('-')">−</button>

                    <button class="btn btn-num" onclick="pressNum('1')">1</button>
                    <button class="btn btn-num" onclick="pressNum('2')">2</button>
                    <button class="btn btn-num" onclick="pressNum('3')">3</button>
                    <button class="btn btn-op" onclick="pressOp('+')">+</button>

                    <button class="btn btn-fn" onclick="pressSqrt()">√</button>
                    <button class="btn btn-num" onclick="pressNum('0')">0</button>
                    <button class="btn btn-num" onclick="pressDot()">.</button>
                    <button class="btn btn-eq" onclick="calculate()">=</button>

                    <button class="btn btn-fn  btn-span2" onclick="pressSquare()">x²</button>
                    <button class="btn btn-del btn-span2" onclick="deleteLast()">⌫ Apagar</button>
                </div>
            </div>

</body>

</html>
